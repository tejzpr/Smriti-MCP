name: Release Binaries

on:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            suffix: linux-amd64
          - runner: macos-13
            goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - runner: windows-latest
            goos: windows
            goarch: amd64
            suffix: windows-amd64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download LadybugDB native library
        run: |
          LBUG_DIR=$(go env GOMODCACHE)/github.com/!ladybug!d!b/go-ladybug@$(grep 'go-ladybug' go.sum | head -1 | awk '{print $2}' | sed 's|/go.mod||')
          chmod +x "$LBUG_DIR/download_lbug.sh"
          cd "$LBUG_DIR" && bash download_lbug.sh
        shell: bash

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
        run: |
          BINARY_NAME="smriti-mcp-${{ matrix.suffix }}"
          go build -trimpath -ldflags='-s -w' -o "${BINARY_NAME}" .
          echo "BINARY_NAME=${BINARY_NAME}" >> $GITHUB_ENV
        shell: bash

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.BINARY_NAME }}

  checksums:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all release assets
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ github.event.release.tag_name }}
          fileName: "smriti-mcp-*"
          out-file-path: assets

      - name: Generate checksums
        run: |
          cd assets
          sha256sum smriti-mcp-* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Upload checksums
        uses: softprops/action-gh-release@v2
        with:
          files: assets/checksums-sha256.txt
