name: Release Binaries

on:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            zig_target: x86_64-linux-musl
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            zig_target: aarch64-linux-musl
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            zig_target: x86_64-macos
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            zig_target: aarch64-macos
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            zig_target: x86_64-windows-gnu
            suffix: windows-amd64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: "zig cc -target ${{ matrix.zig_target }}"
          CXX: "zig c++ -target ${{ matrix.zig_target }}"
        run: |
          BINARY_NAME="smriti-mcp-${{ matrix.suffix }}"
          go build -trimpath -ldflags='-s -w' -o "${BINARY_NAME}" .
          echo "BINARY_NAME=${BINARY_NAME}" >> $GITHUB_ENV

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.BINARY_NAME }}

  checksums:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all release assets
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ github.event.release.tag_name }}
          fileName: "smriti-mcp-*"
          out-file-path: assets

      - name: Generate checksums
        run: |
          cd assets
          sha256sum smriti-mcp-* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Upload checksums
        uses: softprops/action-gh-release@v2
        with:
          files: assets/checksums-sha256.txt
