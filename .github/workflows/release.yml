name: Release Binaries

on:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            suffix: linux-amd64
          - runner: macos-latest
            suffix: darwin-arm64
          - runner: windows-latest
            suffix: windows-amd64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download
        shell: bash

      - name: Determine LadybugDB version from go.mod
        id: lbug-version
        run: |
          LBUG_VER=$(grep 'github.com/LadybugDB/go-ladybug' go.mod | awk '{print $2}')
          echo "version=${LBUG_VER}" >> $GITHUB_OUTPUT
          echo "LadybugDB version: ${LBUG_VER}"
        shell: bash

      - name: Download LadybugDB native library
        run: |
          set -e
          LBUG_VER="${{ steps.lbug-version.outputs.version }}"
          LBUG_DIR=$(go mod download -json github.com/LadybugDB/go-ladybug@${LBUG_VER} | grep '"Dir"' | cut -d'"' -f4)
          echo "LBUG_DIR=$LBUG_DIR"
          chmod -R u+w "$LBUG_DIR"

          # Native library is ABI-compatible; use latest release which has prebuilt assets
          BASE_URL="https://github.com/LadybugDB/ladybug/releases/latest/download"

          OS=$(uname -s)
          ARCH=$(uname -m)
          case "$OS" in
            Linux)
              case "$ARCH" in x86_64) GOARCH="amd64" ;; aarch64) GOARCH="arm64" ;; esac
              ASSET="liblbug-linux-${ARCH}.tar.gz"
              LIB_DIR="$LBUG_DIR/lib/dynamic/linux-${GOARCH}"
              mkdir -p "$LIB_DIR"
              curl -fL -o /tmp/liblbug.tar.gz "${BASE_URL}/${ASSET}"
              mkdir -p /tmp/liblbug && tar -xzf /tmp/liblbug.tar.gz -C /tmp/liblbug
              find /tmp/liblbug -name '*.so*' -exec cp {} "$LIB_DIR/" \;
              ;;
            Darwin)
              case "$ARCH" in arm64) OARCH="arm64" ;; x86_64) OARCH="x86_64" ;; esac
              ASSET="liblbug-osx-${OARCH}.tar.gz"
              LIB_DIR="$LBUG_DIR/lib/dynamic/darwin"
              mkdir -p "$LIB_DIR"
              curl -fL -o /tmp/liblbug.tar.gz "${BASE_URL}/${ASSET}"
              mkdir -p /tmp/liblbug && tar -xzf /tmp/liblbug.tar.gz -C /tmp/liblbug
              find /tmp/liblbug -name '*.dylib' -exec cp {} "$LIB_DIR/" \;
              ;;
            MINGW*|CYGWIN*|MSYS*)
              ASSET="liblbug-windows-x86_64.zip"
              LIB_DIR="$LBUG_DIR/lib/dynamic/windows"
              mkdir -p "$LIB_DIR"
              curl -fL -o /tmp/liblbug.zip "${BASE_URL}/${ASSET}"
              unzip -o /tmp/liblbug.zip -d /tmp/liblbug
              find /tmp/liblbug -name '*.dll' -o -name '*.lib' | xargs -I{} cp {} "$LIB_DIR/"
              ;;
          esac

          echo "=== Lib contents ==="
          find "$LBUG_DIR/lib" -type f 2>/dev/null || echo "No lib directory found"
        shell: bash

      - name: Build binary with portable rpath
        env:
          CGO_ENABLED: "1"
        run: |
          set -e
          BINARY_NAME="smriti-mcp-${{ matrix.suffix }}"
          OS=$(uname -s)

          case "$OS" in
            Linux)
              # Bake $ORIGIN rpath so the binary finds liblbug.so next to itself
              CGO_LDFLAGS="-Wl,-rpath,\$ORIGIN -Wl,-rpath,/usr/local/lib -Wl,-rpath,/usr/lib" \
                go build -trimpath -ldflags='-s -w' -o "${BINARY_NAME}" .
              ;;
            Darwin)
              # Bake @executable_path rpath so the binary finds liblbug.dylib next to itself
              CGO_LDFLAGS="-Wl,-rpath,@executable_path -Wl,-rpath,/usr/local/lib" \
                go build -trimpath -ldflags='-s -w' -o "${BINARY_NAME}" .
              # Also patch any leftover runner-specific rpaths
              install_name_tool -add_rpath @executable_path "${BINARY_NAME}" 2>/dev/null || true
              install_name_tool -add_rpath /usr/local/lib "${BINARY_NAME}" 2>/dev/null || true
              ;;
            MINGW*|CYGWIN*|MSYS*)
              # Windows searches next to the .exe by default
              go build -trimpath -ldflags='-s -w' -o "${BINARY_NAME}" .
              ;;
          esac

          echo "BINARY_NAME=${BINARY_NAME}" >> $GITHUB_ENV
        shell: bash

      - name: Package binary with shared library
        run: |
          set -e
          OS=$(uname -s)
          LBUG_VER="${{ steps.lbug-version.outputs.version }}"
          LBUG_DIR=$(go mod download -json github.com/LadybugDB/go-ladybug@${LBUG_VER} | grep '"Dir"' | cut -d'"' -f4)
          echo "LBUG_DIR=$LBUG_DIR"
          ARCHIVE_NAME=""

          case "$OS" in
            Linux)
              ARCH=$(uname -m)
              case "$ARCH" in x86_64) GOARCH="amd64" ;; aarch64) GOARCH="arm64" ;; esac
              LIB_DIR="$LBUG_DIR/lib/dynamic/linux-${GOARCH}"
              mkdir -p staging
              cp "${{ env.BINARY_NAME }}" staging/
              find "$LIB_DIR" -name '*.so*' -exec cp {} staging/ \;
              ARCHIVE_NAME="smriti-mcp-${{ matrix.suffix }}.tar.gz"
              tar -czf "${ARCHIVE_NAME}" -C staging .
              ;;
            Darwin)
              LIB_DIR="$LBUG_DIR/lib/dynamic/darwin"
              mkdir -p staging
              cp "${{ env.BINARY_NAME }}" staging/
              find "$LIB_DIR" -name '*.dylib' -exec cp {} staging/ \;
              ARCHIVE_NAME="smriti-mcp-${{ matrix.suffix }}.tar.gz"
              tar -czf "${ARCHIVE_NAME}" -C staging .
              ;;
            MINGW*|CYGWIN*|MSYS*)
              LIB_DIR="$LBUG_DIR/lib/dynamic/windows"
              mkdir -p staging
              cp "${{ env.BINARY_NAME }}" staging/
              find "$LIB_DIR" -name '*.dll' -exec cp {} staging/ \;
              ARCHIVE_NAME="smriti-mcp-${{ matrix.suffix }}.zip"
              cd staging && powershell -Command "Compress-Archive -Path * -DestinationPath ../${ARCHIVE_NAME}" && cd ..
              ;;
          esac

          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> $GITHUB_ENV
          echo "=== Archive contents ==="
          if [[ "$ARCHIVE_NAME" == *.tar.gz ]]; then
            tar -tzf "${ARCHIVE_NAME}"
          else
            echo "(zip archive created)"
          fi
        shell: bash

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.BINARY_NAME }}
            ${{ env.ARCHIVE_NAME }}

  checksums:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all release assets
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ github.event.release.tag_name }}
          fileName: "smriti-mcp-*"
          out-file-path: assets

      - name: Generate checksums
        run: |
          cd assets
          sha256sum smriti-mcp-* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Upload checksums
        uses: softprops/action-gh-release@v2
        with:
          files: assets/checksums-sha256.txt
